<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ampulla Admin</title>
<link rel="icon" type="image/png" href="/admin/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#7d8590;--accent:#58a6ff;
  --danger:#f85149;--warn:#d29922;--success:#3fb950;
  --font:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --radius:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button,input,select,textarea{font-family:var(--font);font-size:14px}
input,select,textarea{
  background:var(--bg);color:var(--text);border:1px solid var(--border);
  padding:8px 12px;border-radius:var(--radius);width:100%;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{
  padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
}
button:hover{border-color:var(--muted)}
button.primary{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:600}
button.primary:hover{opacity:0.9}
button.danger{background:transparent;color:var(--danger);border-color:var(--danger)}
button.danger:hover{background:var(--danger);color:var(--text)}
button.sm{padding:4px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
tr:hover td{background:rgba(88,166,255,0.04)}
.badge{
  display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;
}
.badge-error{background:rgba(248,81,73,0.15);color:var(--danger)}
.badge-warning{background:rgba(210,153,34,0.15);color:var(--warn)}
.badge-info{background:rgba(88,166,255,0.15);color:var(--accent)}
.badge-success{background:rgba(63,185,80,0.15);color:var(--success)}
.badge-muted{background:rgba(125,133,144,0.15);color:var(--muted)}

/* Layout */
#app{display:flex;min-height:100vh}
nav{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
nav .logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px;font-size:16px;font-weight:700;color:var(--accent)}
nav a{display:block;padding:8px 20px;color:var(--muted);font-size:13px}
nav a:hover,nav a.active{color:var(--text);text-decoration:none;background:rgba(88,166,255,0.06)}
main{flex:1;padding:32px;max-width:1100px}
h1{font-size:20px;font-weight:600;margin-bottom:20px}
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.toolbar select{width:auto;min-width:160px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{text-align:center}
.stat .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat .label{color:var(--muted);font-size:12px;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px;text-transform:uppercase}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.dsn-box{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;font-size:12px;word-break:break-all;cursor:pointer;position:relative;
}
.dsn-box:hover{border-color:var(--accent)}
.dsn-box::after{content:'click to copy';position:absolute;right:8px;top:8px;color:var(--muted);font-size:10px}
.empty{color:var(--muted);text-align:center;padding:40px}
.json-view{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;font-size:12px;overflow-x:auto;white-space:pre-wrap;
}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:360px}
.login-box h1{text-align:center;margin-bottom:24px}

/* Toast */
#toast-container{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:var(--radius);font-size:13px;
  animation:fadeIn .2s;min-width:240px;border:1px solid var(--border);background:var(--surface);
}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;
  display:flex;align-items:center;justify-content:center;
}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-width:360px;max-width:480px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal p{color:var(--muted);margin-bottom:20px}
.modal .actions{display:flex;gap:12px;justify-content:flex-end}

@media(max-width:768px){
  nav{width:60px;overflow:hidden}
  nav .logo{font-size:0}
  nav .logo::first-letter{font-size:16px}
  nav a{font-size:0;padding:12px 20px}
  nav a::first-letter{font-size:13px}
  main{padding:16px}
}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app"></div>
<script>
(function(){
'use strict';

// --- API ---
const api = {
  async req(method, path, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch('/api/admin' + path, opts);
    if (res.status === 401) { router.go('/login'); throw new Error('unauthorized'); }
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) throw new Error(data?.error || 'request failed');
    if (Array.isArray(data) || data === null) return data || [];
    return data;
  },
  get(p) { return this.req('GET', p); },
  post(p, b) { return this.req('POST', p, b); },
  put(p, b) { return this.req('PUT', p, b); },
  del(p) { return this.req('DELETE', p); },
};

// --- Toast ---
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Modal ---
function confirm(msg) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal"><h2>Confirm</h2><p>${esc(msg)}</p><div class="actions"><button class="cancel">Cancel</button> <button class="danger confirm-btn">Delete</button></div></div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('.cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('.confirm-btn').onclick = () => { overlay.remove(); resolve(true); };
  });
}

// --- Helpers ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c != null) e.append(typeof c === 'string' ? c : c); });
  return e;
}
function timeAgo(ts) {
  const d = new Date(ts);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function levelBadge(level) {
  const m = { error: 'badge-error', warning: 'badge-warning', info: 'badge-info', fatal: 'badge-error' };
  return el('span', { className: 'badge ' + (m[level] || 'badge-muted') }, level || 'unknown');
}
function statusBadge(status) {
  const m = { unresolved: 'badge-error', resolved: 'badge-success', ignored: 'badge-muted' };
  return el('span', { className: 'badge ' + (m[status] || 'badge-muted') }, status);
}

// --- Router ---
const router = {
  routes: [],
  on(pattern, handler) { this.routes.push({ pattern, handler }); },
  go(hash) { location.hash = hash; },
  start() {
    window.addEventListener('hashchange', () => this.dispatch());
    this.dispatch();
  },
  dispatch() {
    const full = location.hash.slice(1) || '/';
    const path = full.split('?')[0];
    for (const route of this.routes) {
      const m = this.match(route.pattern, path);
      if (m) { route.handler(m); return; }
    }
    this.go('/');
  },
  match(pattern, path) {
    const pp = pattern.split('/'), hp = path.split('/');
    if (pp.length !== hp.length) return null;
    const params = {};
    for (let i = 0; i < pp.length; i++) {
      if (pp[i].startsWith(':')) params[pp[i].slice(1)] = hp[i];
      else if (pp[i] !== hp[i]) return null;
    }
    return params;
  }
};

// --- Render helpers ---
function render(content, showNav=true) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (showNav) {
    const n = el('nav', null,
      el('div', { className: 'logo' }, 'ampulla'),
      navLink('/', 'Dashboard'),
      navLink('/orgs', 'Organizations'),
      navLink('/issues', 'Issues'),
      navLink('/transactions', 'Transactions'),
      navLink('/performance', 'Performance'),
      el('a', { href: '#', style: 'margin-top:auto;color:var(--danger)', onClick: async (e) => {
        e.preventDefault(); await api.post('/logout'); router.go('/login');
      }}, 'Logout')
    );
    app.appendChild(n);
  }
  const m = el('main');
  if (typeof content === 'string') m.innerHTML = content;
  else if (content instanceof Node) m.appendChild(content);
  app.appendChild(m);
}
function navLink(hash, label) {
  const active = location.hash.slice(1) === hash || (hash !== '/' && location.hash.slice(1).startsWith(hash));
  return el('a', { href: '#' + hash, className: active ? 'active' : '' }, label);
}

// --- Pages ---

// Login
router.on('/login', async () => {
  const wrap = el('div', { className: 'login-wrap' });
  const box = el('div', { className: 'login-box card' });
  box.innerHTML = '<h1>Ampulla</h1>';
  const form = el('form');
  const ug = el('div', { className: 'form-group' }, el('label', null, 'Username'));
  const ui = el('input', { type: 'text', name: 'username', autocomplete: 'username' });
  ug.appendChild(ui);
  const pg = el('div', { className: 'form-group' }, el('label', null, 'Password'));
  const pi = el('input', { type: 'password', name: 'password', autocomplete: 'current-password' });
  pg.appendChild(pi);
  const btn = el('button', { type: 'submit', className: 'primary', style: 'width:100%;margin-top:8px' }, 'Sign In');
  form.append(ug, pg, btn);
  form.onsubmit = async (e) => {
    e.preventDefault();
    try {
      await api.post('/login', { username: ui.value, password: pi.value });
      router.go('/');
    } catch (err) { toast(err.message, 'error'); }
  };
  box.appendChild(form);
  wrap.appendChild(box);
  render(wrap, false);
  ui.focus();
});

// Dashboard
router.on('/', async () => {
  const frag = el('div');
  frag.appendChild(el('h1', null, 'Dashboard'));
  try {
    const stats = await api.get('/dashboard');
    const cards = el('div', { className: 'cards' });
    for (const [key, val] of Object.entries(stats)) {
      const c = el('div', { className: 'card stat' });
      c.appendChild(el('div', { className: 'num' }, String(val)));
      c.appendChild(el('div', { className: 'label' }, key));
      cards.appendChild(c);
    }
    frag.appendChild(cards);
  } catch (err) { toast(err.message, 'error'); }
  render(frag);
});

// Organizations list
router.on('/orgs', async () => {
  const frag = el('div');
  frag.appendChild(el('h1', null, 'Organizations'));
  const toolbar = el('div', { className: 'toolbar' });
  toolbar.appendChild(el('button', { className: 'primary', onClick: () => router.go('/orgs/new') }, '+ New Organization'));
  frag.appendChild(toolbar);
  try {
    const orgs = await api.get('/organizations');
    if (!orgs || orgs.length === 0) {
      frag.appendChild(el('div', { className: 'empty' }, 'No organizations yet'));
    } else {
      const t = el('table');
      t.appendChild(el('thead', null, el('tr', null,
        el('th', null, 'Name'), el('th', null, 'Slug'), el('th', null, 'Created'), el('th', null, 'Actions')
      )));
      const tb = el('tbody');
      orgs.forEach(o => {
        tb.appendChild(el('tr', null,
          el('td', null, el('a', { href: '#/orgs/' + o.id }, o.name)),
          el('td', { style: 'color:var(--muted)' }, o.slug),
          el('td', { style: 'color:var(--muted)' }, timeAgo(o.dateCreated)),
          el('td', null,
            el('button', { className: 'sm danger', onClick: async () => {
              if (await confirm('Delete organization "' + o.name + '" and all its projects?')) {
                await api.del('/organizations/' + o.id);
                toast('Organization deleted');
                router.dispatch();
              }
            }}, 'Delete')
          )
        ));
      });
      t.appendChild(tb);
      frag.appendChild(el('div', { className: 'card', style: 'padding:0;overflow:auto' }, t));
    }
  } catch (err) { toast(err.message, 'error'); }
  render(frag);
});

// New/Edit Organization
router.on('/orgs/new', () => renderOrgForm());
router.on('/orgs/:id', async (params) => {
  try {
    const orgs = await api.get('/organizations');
    const org = orgs.find(o => String(o.id) === params.id);
    if (!org) { toast('Organization not found', 'error'); router.go('/orgs'); return; }
    renderOrgForm(org);
  } catch (err) { toast(err.message, 'error'); router.go('/orgs'); }
});

async function renderOrgForm(org) {
  const isEdit = !!org;
  const frag = el('div');
  frag.appendChild(el('h1', null, isEdit ? 'Edit Organization' : 'New Organization'));

  const form = el('form', { className: 'card' });
  const row = el('div', { className: 'form-row' });
  const ng = el('div', { className: 'form-group' }, el('label', null, 'Name'));
  const ni = el('input', { type: 'text', value: org?.name || '', placeholder: 'My Organization' });
  ni.addEventListener('input', () => {
    if (!isEdit || si.dataset.auto !== 'false') {
      si.value = ni.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      si.dataset.auto = 'true';
    }
  });
  ng.appendChild(ni);
  const sg = el('div', { className: 'form-group' }, el('label', null, 'Slug'));
  const si = el('input', { type: 'text', value: org?.slug || '', placeholder: 'my-organization' });
  si.addEventListener('input', () => { si.dataset.auto = 'false'; });
  sg.appendChild(si);
  row.append(ng, sg);
  form.appendChild(row);
  const actions = el('div', { className: 'toolbar' });
  actions.appendChild(el('button', { type: 'submit', className: 'primary' }, isEdit ? 'Save' : 'Create'));
  actions.appendChild(el('button', { type: 'button', onClick: () => router.go('/orgs') }, 'Cancel'));
  form.appendChild(actions);
  form.onsubmit = async (e) => {
    e.preventDefault();
    try {
      if (isEdit) {
        await api.put('/organizations/' + org.id, { name: ni.value, slug: si.value });
        toast('Organization updated');
      } else {
        await api.post('/organizations', { name: ni.value, slug: si.value });
        toast('Organization created');
      }
      router.go('/orgs');
    } catch (err) { toast(err.message, 'error'); }
  };
  frag.appendChild(form);

  // If editing, show projects
  if (isEdit) {
    frag.appendChild(el('h1', { style: 'margin-top:32px' }, 'Projects'));
    const toolbar = el('div', { className: 'toolbar' });
    toolbar.appendChild(el('button', { className: 'primary', onClick: () => router.go('/projects/new?org=' + org.id) }, '+ New Project'));
    frag.appendChild(toolbar);
    try {
      const projects = await api.get('/organizations/' + org.slug + '/projects');
      if (!projects || projects.length === 0) {
        frag.appendChild(el('div', { className: 'empty' }, 'No projects in this organization'));
      } else {
        const t = el('table');
        t.appendChild(el('thead', null, el('tr', null,
          el('th', null, 'Name'), el('th', null, 'Slug'), el('th', null, 'Platform'), el('th', null, 'Actions')
        )));
        const tb = el('tbody');
        projects.forEach(p => {
          tb.appendChild(el('tr', null,
            el('td', null, el('a', { href: '#/projects/' + p.id }, p.name)),
            el('td', { style: 'color:var(--muted)' }, p.slug),
            el('td', { style: 'color:var(--muted)' }, p.platform || '-'),
            el('td', null,
              el('button', { className: 'sm danger', onClick: async () => {
                if (await confirm('Delete project "' + p.name + '"?')) {
                  await api.del('/projects/' + p.id);
                  toast('Project deleted');
                  router.dispatch();
                }
              }}, 'Delete')
            )
          ));
        });
        t.appendChild(tb);
        frag.appendChild(el('div', { className: 'card', style: 'padding:0;overflow:auto' }, t));
      }
    } catch (err) { toast(err.message, 'error'); }
  }
  render(frag);
  ni.focus();
}

// New/Edit Project
router.on('/projects/new', () => renderProjectForm());
router.on('/projects/:id', async (params) => {
  try {
    const projects = await api.get('/projects');
    const proj = projects.find(p => String(p.id) === params.id);
    if (!proj) { toast('Project not found', 'error'); router.go('/orgs'); return; }
    renderProjectForm(proj);
  } catch (err) { toast(err.message, 'error'); router.go('/orgs'); }
});

async function renderProjectForm(proj) {
  const isEdit = !!proj;
  const frag = el('div');
  frag.appendChild(el('h1', null, isEdit ? 'Edit Project' : 'New Project'));

  let orgs = [];
  try { orgs = await api.get('/organizations'); } catch {}
  const defaultOrgId = isEdit ? proj.organizationId : (new URLSearchParams(location.hash.split('?')[1]).get('org') || '');

  const form = el('form', { className: 'card' });
  if (!isEdit) {
    const og = el('div', { className: 'form-group' }, el('label', null, 'Organization'));
    const os = el('select');
    orgs.forEach(o => {
      const opt = el('option', { value: String(o.id) }, o.name);
      if (String(o.id) === String(defaultOrgId)) opt.selected = true;
      os.appendChild(opt);
    });
    og.appendChild(os);
    form.appendChild(og);
    form._orgSelect = os;
  }
  const row = el('div', { className: 'form-row' });
  const ng = el('div', { className: 'form-group' }, el('label', null, 'Name'));
  const ni = el('input', { type: 'text', value: proj?.name || '' });
  ni.addEventListener('input', () => {
    if (!isEdit || si.dataset.auto !== 'false') {
      si.value = ni.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }
  });
  ng.appendChild(ni);
  const sg = el('div', { className: 'form-group' }, el('label', null, 'Slug'));
  const si = el('input', { type: 'text', value: proj?.slug || '' });
  si.addEventListener('input', () => { si.dataset.auto = 'false'; });
  sg.appendChild(si);
  row.append(ng, sg);
  form.appendChild(row);
  const pg = el('div', { className: 'form-group' }, el('label', null, 'Platform'));
  const pi = el('input', { type: 'text', value: proj?.platform || '', placeholder: 'javascript, python, go...' });
  pg.appendChild(pi);
  form.appendChild(pg);

  // ntfy notification config
  if (isEdit) {
    form.appendChild(el('h3', { style: 'margin-top:16px;margin-bottom:8px;color:var(--muted)' }, 'Notifications (ntfy)'));
    const ntfyRow = el('div', { className: 'form-row' });
    const nug = el('div', { className: 'form-group' }, el('label', null, 'ntfy Server URL'));
    const nui = el('input', { type: 'text', value: proj?.ntfyUrl || '', placeholder: 'https://n.elmisi.com' });
    nug.appendChild(nui);
    const ntg = el('div', { className: 'form-group' }, el('label', null, 'Topic'));
    const nti = el('input', { type: 'text', value: proj?.ntfyTopic || '', placeholder: 'my-project-errors' });
    ntg.appendChild(nti);
    ntfyRow.append(nug, ntg);
    form.appendChild(ntfyRow);
    const nkg = el('div', { className: 'form-group' }, el('label', null, 'Token (optional)'));
    const nki = el('input', { type: 'password', value: proj?.ntfyToken || '', placeholder: 'Bearer token' });
    nkg.appendChild(nki);
    form.appendChild(nkg);
    form._ntfyUrl = nui;
    form._ntfyTopic = nti;
    form._ntfyToken = nki;
  }

  const actions = el('div', { className: 'toolbar' });
  actions.appendChild(el('button', { type: 'submit', className: 'primary' }, isEdit ? 'Save' : 'Create'));
  actions.appendChild(el('button', { type: 'button', onClick: () => history.back() }, 'Cancel'));
  form.appendChild(actions);
  form.onsubmit = async (e) => {
    e.preventDefault();
    try {
      if (isEdit) {
        await api.put('/projects/' + proj.id, {
          name: ni.value, slug: si.value, platform: pi.value,
          ntfyUrl: form._ntfyUrl?.value || '', ntfyTopic: form._ntfyTopic?.value || '', ntfyToken: form._ntfyToken?.value || ''
        });
        toast('Project updated');
      } else {
        const orgId = parseInt(form._orgSelect.value);
        await api.post('/projects', { orgId, name: ni.value, slug: si.value, platform: pi.value });
        toast('Project created');
      }
      history.back();
    } catch (err) { toast(err.message, 'error'); }
  };
  frag.appendChild(form);

  // If editing, show DSN keys
  if (isEdit) {
    frag.appendChild(el('h1', { style: 'margin-top:32px' }, 'DSN Keys'));
    const toolbar = el('div', { className: 'toolbar' });
    toolbar.appendChild(el('button', { className: 'primary', onClick: async () => {
      const label = prompt('Key label:', 'Default');
      if (label === null) return;
      try {
        await api.post('/projects/' + proj.id + '/keys', { label });
        toast('Key created');
        router.dispatch();
      } catch (err) { toast(err.message, 'error'); }
    }}, '+ New Key'));
    frag.appendChild(toolbar);
    try {
      const keys = await api.get('/projects/' + proj.id + '/keys');
      if (!keys || keys.length === 0) {
        frag.appendChild(el('div', { className: 'empty' }, 'No DSN keys yet'));
      } else {
        keys.forEach(k => {
          const card = el('div', { className: 'card' });
          const header = el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px' });
          header.appendChild(el('div', null,
            el('strong', null, k.label + ' '),
            statusBadge(k.isActive ? 'active' : 'inactive')
          ));
          const btns = el('div', { style: 'display:flex;gap:8px' });
          btns.appendChild(el('button', { className: 'sm', onClick: async () => {
            await api.put('/keys/' + k.id, { isActive: !k.isActive });
            toast(k.isActive ? 'Key disabled' : 'Key enabled');
            router.dispatch();
          }}, k.isActive ? 'Disable' : 'Enable'));
          btns.appendChild(el('button', { className: 'sm danger', onClick: async () => {
            if (await confirm('Delete this key?')) {
              await api.del('/keys/' + k.id);
              toast('Key deleted');
              router.dispatch();
            }
          }}, 'Delete'));
          header.appendChild(btns);
          card.appendChild(header);
          const dsn = el('div', { className: 'dsn-box', onClick: () => {
            navigator.clipboard.writeText(k.dsn);
            toast('DSN copied to clipboard');
          }}, k.dsn);
          card.appendChild(dsn);
          frag.appendChild(card);
        });
      }
    } catch (err) { toast(err.message, 'error'); }
  }
  render(frag);
  ni.focus();
}

// Issues list
router.on('/issues', async () => {
  const frag = el('div');
  frag.appendChild(el('h1', null, 'Issues'));
  const toolbar = el('div', { className: 'toolbar' });
  let projects = [];
  try { projects = await api.get('/projects'); } catch {}
  const sel = el('select');
  sel.appendChild(el('option', { value: '' }, 'All projects'));
  projects.forEach(p => sel.appendChild(el('option', { value: String(p.id) }, p.name)));
  sel.onchange = () => loadIssues();
  toolbar.appendChild(sel);
  frag.appendChild(toolbar);

  const container = el('div');
  frag.appendChild(container);

  async function loadIssues() {
    container.innerHTML = '';
    try {
      const q = sel.value ? '?project=' + sel.value : '';
      const issues = await api.get('/issues' + q);
      if (!issues || issues.length === 0) {
        container.appendChild(el('div', { className: 'empty' }, 'No issues'));
        return;
      }
      const t = el('table');
      t.appendChild(el('thead', null, el('tr', null,
        el('th', null, 'Issue'), el('th', null, 'Level'), el('th', null, 'Status'),
        el('th', null, 'Events'), el('th', null, 'Last Seen'), el('th', null, 'Actions')
      )));
      const tb = el('tbody');
      issues.forEach(i => {
        tb.appendChild(el('tr', null,
          el('td', null, el('a', { href: '#/issues/' + i.id }, i.title)),
          el('td', null, levelBadge(i.level)),
          el('td', null, statusBadge(i.status)),
          el('td', { style: 'color:var(--muted)' }, String(i.count)),
          el('td', { style: 'color:var(--muted)' }, timeAgo(i.lastSeen)),
          el('td', null,
            el('button', { className: 'sm', onClick: async () => {
              const newStatus = i.status === 'resolved' ? 'unresolved' : 'resolved';
              await api.put('/issues/' + i.id, { status: newStatus });
              toast('Issue ' + newStatus);
              loadIssues();
            }}, i.status === 'resolved' ? 'Reopen' : 'Resolve'),
            ' ',
            el('button', { className: 'sm danger', onClick: async () => {
              if (await confirm('Delete this issue and all its events?')) {
                await api.del('/issues/' + i.id);
                toast('Issue deleted');
                loadIssues();
              }
            }}, 'Delete')
          )
        ));
      });
      t.appendChild(tb);
      container.appendChild(el('div', { className: 'card', style: 'padding:0;overflow:auto' }, t));
    } catch (err) { toast(err.message, 'error'); }
  }
  render(frag);
  loadIssues();
});

// Issue detail
router.on('/issues/:id', async (params) => {
  const frag = el('div');
  const back = el('a', { href: '#/issues', style: 'color:var(--muted);font-size:12px' }, '< Back to issues');
  frag.appendChild(back);
  const heading = el('h1', { style: 'margin-top:8px' }, 'Issue ' + params.id);
  frag.appendChild(heading);
  try {
    const [issue, events] = await Promise.all([
      api.get('/issues/' + params.id),
      api.get('/issues/' + params.id + '/events')
    ]);
    if (issue && issue.title) heading.textContent = 'Issue ' + params.id + ' — ' + issue.title;
    if (!events || events.length === 0) {
      frag.appendChild(el('div', { className: 'empty' }, 'No events for this issue'));
    } else {
      events.forEach(ev => {
        const card = el('div', { className: 'card' });
        const header = el('div', { style: 'display:flex;justify-content:space-between;margin-bottom:12px' });
        header.appendChild(el('div', null,
          levelBadge(ev.level), ' ',
          el('span', { style: 'color:var(--muted);margin-left:8px' }, ev.eventID?.slice(0, 8)),
          el('span', { style: 'color:var(--muted);margin-left:12px' }, timeAgo(ev.dateCreated))
        ));
        header.appendChild(el('span', { style: 'color:var(--muted)' }, ev.platform || ''));
        card.appendChild(header);
        if (ev.message) card.appendChild(el('div', { style: 'margin-bottom:12px' }, ev.message));
        // Raw event JSON (always visible)
        const jsonDiv = el('div', { className: 'json-view' });
        try {
          const ctx = typeof ev.context === 'string' ? JSON.parse(ev.context) : ev.context;
          jsonDiv.textContent = JSON.stringify(ctx, null, 2);
        } catch { jsonDiv.textContent = String(ev.context); }
        card.appendChild(jsonDiv);
        frag.appendChild(card);
      });
    }
  } catch (err) { toast(err.message, 'error'); }
  render(frag);
});

// Performance
router.on('/performance', async () => {
  const frag = el('div');
  frag.appendChild(el('h1', null, 'Performance'));
  const toolbar = el('div', { className: 'toolbar' });
  let projects = [];
  try { projects = await api.get('/projects'); } catch {}
  const sel = el('select');
  sel.appendChild(el('option', { value: '' }, 'All projects'));
  projects.forEach(p => sel.appendChild(el('option', { value: String(p.id) }, p.name)));
  sel.onchange = () => loadPerf();
  toolbar.appendChild(sel);
  const timeSel = el('select');
  [{ v: '1', l: 'Last 24 hours' }, { v: '7', l: 'Last 7 days' }, { v: '30', l: 'Last 30 days' }].forEach(o => {
    const opt = el('option', { value: o.v }, o.l);
    if (o.v === '7') opt.selected = true;
    timeSel.appendChild(opt);
  });
  timeSel.onchange = () => loadPerf();
  toolbar.appendChild(timeSel);
  frag.appendChild(toolbar);

  const container = el('div');
  frag.appendChild(container);

  async function loadPerf() {
    container.innerHTML = '';
    try {
      const params = [];
      if (sel.value) params.push('project=' + sel.value);
      params.push('days=' + timeSel.value);
      const data = await api.get('/performance?' + params.join('&'));

      // Summary cards
      const cards = el('div', { className: 'cards' });
      const countCard = el('div', { className: 'card stat' });
      countCard.appendChild(el('div', { className: 'num' }, String(data.totalCount || 0)));
      countCard.appendChild(el('div', { className: 'label' }, 'Total Transactions'));
      cards.appendChild(countCard);
      if (data.oldestTransaction) {
        const oldCard = el('div', { className: 'card stat' });
        oldCard.appendChild(el('div', { className: 'num', style: 'font-size:1.2rem' }, timeAgo(data.oldestTransaction)));
        oldCard.appendChild(el('div', { className: 'label' }, 'Oldest Transaction'));
        cards.appendChild(oldCard);
      }
      container.appendChild(cards);

      // Endpoints table
      const label = timeSel.options[timeSel.selectedIndex].text.toLowerCase();
      container.appendChild(el('h2', { style: 'margin-top:24px' }, 'Endpoints (' + label + ')'));
      if (!data.endpoints || data.endpoints.length === 0) {
        container.appendChild(el('div', { className: 'empty' }, 'No transaction data'));
      } else {
        const t = el('table');
        t.appendChild(el('thead', null, el('tr', null,
          el('th', null, 'Endpoint'), el('th', null, 'Op'), el('th', null, 'Count'),
          el('th', null, 'Avg'), el('th', null, 'P50'), el('th', null, 'P75'),
          el('th', null, 'P95'), el('th', null, 'P99')
        )));
        const tb = el('tbody');
        data.endpoints.forEach(ep => {
          const durStyle = (ms) => {
            if (ms > 1000) return 'color:var(--danger);font-weight:600';
            if (ms > 500) return 'color:var(--warning);font-weight:600';
            return '';
          };
          tb.appendChild(el('tr', null,
            el('td', { style: 'max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, ep.name || '-'),
            el('td', { style: 'color:var(--muted)' }, ep.op || '-'),
            el('td', null, String(ep.count)),
            el('td', null, ep.avgMs + 'ms'),
            el('td', null, ep.p50 + 'ms'),
            el('td', null, ep.p75 + 'ms'),
            el('td', { style: durStyle(ep.p95) }, ep.p95 + 'ms'),
            el('td', { style: durStyle(ep.p99) }, ep.p99 + 'ms')
          ));
        });
        t.appendChild(tb);
        container.appendChild(el('div', { className: 'card', style: 'padding:0;overflow:auto' }, t));
      }
    } catch (err) { toast(err.message, 'error'); }
  }

  await loadPerf();
  render(frag);
});

// --- Init ---
(async function init() {
  try {
    await api.get('/me');
    if (!location.hash || location.hash === '#/login') location.hash = '#/';
  } catch {
    location.hash = '#/login';
  }
  router.start();
})();

})();
